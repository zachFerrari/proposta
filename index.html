<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ho una domanda per te...</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            overflow: hidden;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 360px;
            width: 100%;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            border: 2px solid dashed #fff;
        }

        .heart-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #d63384;
            font-size: 1.6rem;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .btn-container {
            position: relative;
            height: 60px;
            width: 100%;
        }

        .btn {
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: absolute;
            width: 100px;
        }

        #btn-si {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            left: 10%;
        }

        #btn-no {
            background: linear-gradient(135deg, #dc3545, #fd7e14);
            color: white;
            right: 10%;
            transition: all 0.1s ease;
            touch-action: none; /* Cruciale per bloccare il touch standard su mobile */
        }

        .success-screen {
            display: none;
        }

        .success-screen h2 {
            color: #28a745;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .success-screen p {
            color: #495057;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div id="quiz-screen">
            <div class="heart-icon">🌹</div>
            <h1>Ti andrebbe di uscire con me?</h1>
            <div class="btn-container">
                <button class="btn" id="btn-si" onclick="haDettoSi()">Sì!</button>
                <button class="btn" id="btn-no">No</button>
            </div>
        </div>

        <div id="success-screen" class="success-screen">
            <div class="heart-icon">✨🎉✨</div>
            <h2>Evviva!</h2>
            <p>Sapevo che non avresti saputo resistere! 😉<br>Organizziamo subito, ti scrivo!</p>
        </div>
    </div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const card = document.getElementById('main-card');
        const quizScreen = document.getElementById('quiz-screen');
        const successScreen = document.getElementById('success-screen');

        function scappa(e) {
            // Blocca il click o il tocco reale
            if(e) e.preventDefault();

            // Calcola l'area utile dentro la card affinché il tasto rimanga visibile ma si sposti
            const limitiCard = card.getBoundingClientRect();
            const larghezzaBottone = btnNo.offsetWidth;
            const altezzaBottone = btnNo.offsetHeight;

            // Genera posizioni casuali interne
            const maxTop = limitiCard.height - altezzaBottone - 40;
            const maxLeft = limitiCard.width - larghezzaBottone - 40;

            // Sposta il bottone in un punto random (aggiungendo un piccolo margine)
            const randomTop = Math.floor(Math.random() * maxTop) + 10;
            const randomLeft = Math.floor(Math.random() * maxLeft) + 10;

            btnNo.style.top = randomTop + 'px';
            btnNo.style.left = randomLeft + 'px';
        }

        // Intercetta sia il mouse su PC che il tocco su Mobile
        btnNo.addEventListener('mouseenter', scappa);
        btnNo.addEventListener('touchstart', scappa);
        btnNo.addEventListener('click', scappa);

        // Funzione di successo
        function haDettoSi() {
            quizScreen.style.display = 'none';
            successScreen.style.display = 'block';
        }
    </script>
</body>
</html>
